name: Build and Release LVM2

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and release"
        required: true
        type: string

jobs:
  build-amd64:
    name: Build amd64 (${{ inputs.version }})
    runs-on: ubuntu-24.04
    container: debian:bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential pkg-config libaio-dev libdevmapper-dev libudev-dev tar xfslibs-dev

      - name: Build
        run: |
          bash source/build.sh \
            "${{ inputs.version }}" \
            "lvm2-${{ inputs.version }}-amd64.tar.gz"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lvm2-${{ inputs.version }}-amd64
          path: lvm2-${{ inputs.version }}-amd64.tar.gz

  build-arm64:
    name: Build arm64 (${{ inputs.version }})
    runs-on: ubuntu-24.04-arm
    container: debian:bookworm-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl build-essential pkg-config libaio-dev libdevmapper-dev libudev-dev tar xfslibs-dev

      - name: Build
        run: |
          bash source/build.sh \
            "${{ inputs.version }}" \
            "lvm2-${{ inputs.version }}-arm64.tar.gz"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lvm2-${{ inputs.version }}-arm64
          path: lvm2-${{ inputs.version }}-arm64.tar.gz

  release:
    name: Create Release ${{ inputs.version }}
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lvm2-*
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: artifacts/**/*
          draft: false
          prerelease: false
